<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재시험 관리 - 엘리트관</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f4f6fb; color: #111; }
  input, select, textarea, button { font-family: inherit; }
  input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 36px; height: 36px; border: 3px solid #e0e0e0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const API_URL = "https://script.google.com/macros/s/AKfycbxZHOCiJyA6mkCL__iYFmsKqHWvJz52XcFzTbO8vhQTLr9CnhsykORQ3rG9Ufmjc7ej/exec";

const TYPES = {
  재시험:  { color: "#1a56db", bg: "#e8f0fe", border: "#c7d7fa" },
  보강시험: { color: "#7e3af2", bg: "#f0e8ff", border: "#d5b8ff" },
  완료:    { color: "#1a7a4a", bg: "#e4f5ec", border: "#b2dfcc" },
};
const EMPTY = { type: "재시험", date: "", cls: "", name: "", content: "", retestDate: "", notes: "" };

const inp = { width: "100%", padding: "8px 10px", border: "1px solid #ddd", borderRadius: 8, fontSize: 14, background: "#fff", color: "#111" };
const lbl = { fontSize: 12, color: "#555", marginBottom: 4, display: "block", fontWeight: 600 };
const fld = { marginBottom: 14 };

async function apiFetch(body) {
  const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(body) });
  return res.json();
}

function TypeBadge({ type }) {
  const s = TYPES[type] || TYPES["재시험"];
  return React.createElement("span", { style: { background: s.bg, color: s.color, border: `1px solid ${s.border}`, fontSize: 11, fontWeight: 700, padding: "3px 9px", borderRadius: 20, whiteSpace: "nowrap" } }, type);
}

function Modal({ record, onSave, onClose, saving }) {
  const [form, setForm] = React.useState(record ? { ...record } : { ...EMPTY });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  return React.createElement("div", {
    style: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 },
    onClick: e => e.target === e.currentTarget && onClose()
  },
    React.createElement("div", { style: { background: "#fff", borderRadius: 16, padding: "26px 28px 20px", width: "min(560px, 96vw)", maxHeight: "92vh", overflowY: "auto", boxShadow: "0 8px 40px rgba(0,0,0,0.18)" } },
      React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 } },
        React.createElement("h2", { style: { margin: 0, fontSize: 17, fontWeight: 700 } }, record ? "기록 수정" : "재시험 추가"),
        React.createElement("button", { onClick: onClose, style: { background: "none", border: "none", fontSize: 22, cursor: "pointer", color: "#999" } }, "✕")
      ),
      React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "0 14px" } },
        React.createElement("div", { style: fld },
          React.createElement("label", { style: lbl }, "구분"),
          React.createElement("select", { style: inp, value: form.type, onChange: e => set("type", e.target.value) },
            Object.keys(TYPES).map(t => React.createElement("option", { key: t }, t))
          )
        ),
        React.createElement("div", { style: fld },
          React.createElement("label", { style: lbl }, "날짜"),
          React.createElement("input", { style: inp, type: "date", value: form.date, onChange: e => set("date", e.target.value) })
        ),
        React.createElement("div", { style: fld },
          React.createElement("label", { style: lbl }, "반명"),
          React.createElement("input", { style: inp, value: form.cls, onChange: e => set("cls", e.target.value), placeholder: "M1A, 6B …" })
        )
      ),
      React.createElement("div", { style: fld },
        React.createElement("label", { style: lbl }, "이름 *"),
        React.createElement("input", { style: inp, value: form.name, onChange: e => set("name", e.target.value), placeholder: "학생 이름" })
      ),
      React.createElement("div", { style: fld },
        React.createElement("label", { style: lbl }, "재시 내용 (Insight Link / Short Article은 영영풀이 불러주기)"),
        React.createElement("textarea", { style: { ...inp, resize: "vertical", minHeight: 80 }, value: form.content, onChange: e => set("content", e.target.value), placeholder: "예: BV4800 스프링테스트 - Unit 15" })
      ),
      React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 14px" } },
        React.createElement("div", { style: fld },
          React.createElement("label", { style: lbl }, "재시 일자"),
          React.createElement("input", { style: inp, value: form.retestDate, onChange: e => set("retestDate", e.target.value), placeholder: "예: 3/12 목 18시" })
        ),
        React.createElement("div", { style: fld },
          React.createElement("label", { style: lbl }, "기타"),
          React.createElement("input", { style: inp, value: form.notes, onChange: e => set("notes", e.target.value), placeholder: "메모" })
        )
      ),
      React.createElement("div", { style: { display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 4 } },
        React.createElement("button", { onClick: onClose, style: { padding: "9px 20px", border: "1px solid #ddd", borderRadius: 8, background: "#f5f5f5", cursor: "pointer", fontSize: 14 } }, "취소"),
        React.createElement("button", {
          disabled: saving,
          onClick: () => { if (!form.name.trim()) { alert("이름을 입력하세요."); return; } onSave(form); },
          style: { padding: "9px 24px", border: "none", borderRadius: 8, background: saving ? "#93b4f5" : "#2563eb", color: "#fff", cursor: saving ? "default" : "pointer", fontSize: 14, fontWeight: 600 }
        }, saving ? "저장 중…" : "저장")
      )
    )
  );
}

function App() {
  const [records, setRecords] = React.useState([]);
  const [status, setStatus] = React.useState("loading");
  const [errMsg, setErrMsg] = React.useState("");
  const [modal, setModal] = React.useState(null);
  const [saving, setSaving] = React.useState(false);
  const [search, setSearch] = React.useState("");
  const [fType, setFType] = React.useState("전체");
  const [fCls, setFCls] = React.useState("전체");
  const [sortKey, setSortKey] = React.useState("date");
  const [sortAsc, setSortAsc] = React.useState(false);
  const [delId, setDelId] = React.useState(null);
  const [sel, setSel] = React.useState(new Set());

  const load = React.useCallback(async () => {
    setStatus("loading");
    try {
      const res = await fetch(API_URL + "?t=" + Date.now());
      const json = await res.json();
      if (!json.ok) throw new Error(json.error);
      setRecords(json.data);
      setStatus("ok");
    } catch (e) { setErrMsg(e.message); setStatus("error"); }
  }, []);

  React.useEffect(() => { load(); }, [load]);

  const handleSave = async (form) => {
    setSaving(true);
    try {
      const isNew = !form.id;
      const res = await apiFetch({ action: isNew ? "add" : "update", ...form });
      if (!res.ok) throw new Error(res.error);
      if (isNew) setRecords(r => [{ ...form, id: res.id }, ...r]);
      else setRecords(r => r.map(x => x.id === form.id ? form : x));
      setModal(null);
    } catch (e) { alert("저장 실패: " + e.message); }
    setSaving(false);
  };

  const handleDelete = async (id) => {
    try {
      const res = await apiFetch({ action: "delete", id });
      if (!res.ok) throw new Error(res.error);
      setRecords(r => r.filter(x => x.id !== id));
      setDelId(null);
    } catch (e) { alert("삭제 실패: " + e.message); }
  };

  const markDone = async (ids) => {
    const targets = records.filter(r => ids.has(r.id) && r.type !== "완료");
    for (const r of targets) await apiFetch({ action: "update", ...r, type: "완료" });
    setRecords(prev => prev.map(r => ids.has(r.id) ? { ...r, type: "완료" } : r));
    setSel(new Set());
  };

  const clsList = ["전체", ...Array.from(new Set(records.map(r => r.cls).filter(Boolean))).sort()];
  const filtered = records.filter(r => {
    const q = search.toLowerCase();
    if (q && !r.name.includes(q) && !(r.cls||"").toLowerCase().includes(q) && !(r.content||"").toLowerCase().includes(q) && !(r.notes||"").toLowerCase().includes(q)) return false;
    if (fType !== "전체" && r.type !== fType) return false;
    if (fCls !== "전체" && r.cls !== fCls) return false;
    return true;
  }).sort((a, b) => {
    const av = a[sortKey] || "", bv = b[sortKey] || "";
    return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });

  const stats = { 전체: records.length, 재시험: records.filter(r=>r.type==="재시험").length, 보강시험: records.filter(r=>r.type==="보강시험").length, 완료: records.filter(r=>r.type==="완료").length, 미완료: records.filter(r=>r.type!=="완료").length };
  const allChk = filtered.length > 0 && filtered.every(r => sel.has(r.id));

  const thStyle = (k) => ({ padding: "10px 12px", textAlign: "left", fontWeight: 600, fontSize: 12, color: "#555", whiteSpace: "nowrap", cursor: "pointer", userSelect: "none", background: "#f7f8fa" });

  if (status === "loading") return React.createElement("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", gap: 16 } },
    React.createElement("div", { className: "spinner" }),
    React.createElement("p", { style: { color: "#aaa", fontSize: 14 } }, "구글시트에서 불러오는 중…")
  );

  if (status === "error") return React.createElement("div", { style: { padding: 40, textAlign: "center", maxWidth: 500, margin: "80px auto" } },
    React.createElement("div", { style: { fontSize: 40, marginBottom: 12 } }, "⚠️"),
    React.createElement("p", { style: { color: "#e53e3e", fontWeight: 600, marginBottom: 8, fontSize: 16 } }, "구글시트 연결 실패"),
    React.createElement("p", { style: { color: "#888", fontSize: 13, marginBottom: 8 } }, errMsg),
    React.createElement("p", { style: { color: "#aaa", fontSize: 12, marginBottom: 24 } }, "Apps Script 배포 시 액세스 권한을 '모든 사용자'로 설정했는지 확인하세요."),
    React.createElement("button", { onClick: load, style: { padding: "10px 28px", background: "#2563eb", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 14 } }, "다시 시도")
  );

  return React.createElement("div", { style: { minHeight: "100vh", background: "#f4f6fb" } },
    React.createElement("div", { style: { maxWidth: 1200, margin: "0 auto", padding: "20px 14px" } },

      // Header
      React.createElement("div", { style: { display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 18, flexWrap: "wrap", gap: 10 } },
        React.createElement("div", null,
          React.createElement("h1", { style: { margin: 0, fontSize: 22, fontWeight: 700 } }, "📋 재시험 관리"),
          React.createElement("p", { style: { margin: "3px 0 0", fontSize: 12, color: "#aaa" } }, "엘리트관 · 구글시트 실시간 연동")
        ),
        React.createElement("div", { style: { display: "flex", gap: 8 } },
          React.createElement("button", { onClick: load, style: { padding: "9px 14px", background: "#fff", color: "#555", border: "1px solid #ddd", borderRadius: 10, fontSize: 13, cursor: "pointer" } }, "↻ 새로고침"),
          React.createElement("button", { onClick: () => setModal("add"), style: { padding: "10px 20px", background: "#2563eb", color: "#fff", border: "none", borderRadius: 10, fontSize: 14, fontWeight: 600, cursor: "pointer" } }, "+ 추가")
        )
      ),

      // Stats
      React.createElement("div", { style: { display: "flex", gap: 10, marginBottom: 14, flexWrap: "wrap" } },
        [
          { label: "전체", val: stats.전체, color: "#374151", warn: false },
          { label: "재시험", val: stats.재시험, color: "#1a56db", warn: false },
          { label: "보강시험", val: stats.보강시험, color: "#7e3af2", warn: false },
          { label: "완료", val: stats.완료, color: "#1a7a4a", warn: false },
          { label: "⚠ 미완료", val: stats.미완료, color: "#b97300", warn: true },
        ].map(s => React.createElement("div", { key: s.label, style: { background: s.warn ? "#fff8e1" : "#fff", border: `1px solid ${s.warn ? "#ffc107" : "#eee"}`, borderRadius: 12, padding: "11px 18px", flex: "1 1 70px", minWidth: 70 } },
          React.createElement("div", { style: { fontSize: 11, color: s.warn ? "#7a5800" : "#aaa", fontWeight: 600 } }, s.label),
          React.createElement("div", { style: { fontSize: 24, fontWeight: 700, color: s.color, marginTop: 2 } }, s.val)
        ))
      ),

      // Filters
      React.createElement("div", { style: { display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap", alignItems: "center" } },
        React.createElement("input", { style: { flex: "1 1 160px", padding: "8px 12px", border: "1px solid #ddd", borderRadius: 8, fontSize: 13, background: "#fff" }, placeholder: "🔍  이름 · 반명 · 내용 검색", value: search, onChange: e => setSearch(e.target.value) }),
        React.createElement("select", { style: { padding: "8px 10px", border: "1px solid #ddd", borderRadius: 8, fontSize: 13, background: "#fff", color: "#333" }, value: fType, onChange: e => setFType(e.target.value) },
          ["전체", ...Object.keys(TYPES)].map(t => React.createElement("option", { key: t }, t))
        ),
        React.createElement("select", { style: { padding: "8px 10px", border: "1px solid #ddd", borderRadius: 8, fontSize: 13, background: "#fff", color: "#333" }, value: fCls, onChange: e => setFCls(e.target.value) },
          clsList.map(c => React.createElement("option", { key: c }, c))
        ),
        sel.size > 0 && React.createElement("button", { onClick: () => markDone(sel), style: { padding: "8px 14px", background: "#e4f5ec", color: "#1a7a4a", border: "1px solid #b2dfcc", borderRadius: 8, cursor: "pointer", fontSize: 12, fontWeight: 700 } }, `✓ 선택 ${sel.size}건 완료 처리`)
      ),

      // Table
      filtered.length === 0
        ? React.createElement("div", { style: { textAlign: "center", padding: "60px 20px", color: "#ccc", border: "1px dashed #e0e0e0", borderRadius: 12, background: "#fff" } },
            React.createElement("div", { style: { fontSize: 40, marginBottom: 10 } }, "📄"),
            React.createElement("div", { style: { fontSize: 14 } }, records.length === 0 ? "등록된 기록이 없습니다" : "검색 결과가 없습니다")
          )
        : React.createElement("div", { style: { border: "1px solid #e8e8e8", borderRadius: 12, overflow: "hidden", background: "#fff" } },
            React.createElement("div", { style: { overflowX: "auto" } },
              React.createElement("table", { style: { width: "100%", borderCollapse: "collapse", fontSize: 13 } },
                React.createElement("thead", null,
                  React.createElement("tr", { style: { borderBottom: "1px solid #eee" } },
                    React.createElement("th", { style: { ...thStyle(), width: 36, paddingLeft: 14 } },
                      React.createElement("input", { type: "checkbox", checked: allChk, onChange: () => setSel(allChk ? new Set() : new Set(filtered.map(r => r.id))) })
                    ),
                    ...["type:구분:80", "date:날짜:90", "cls:반명:60", "name:이름:72", "content:재시 내용:auto", "retestDate:재시 일자:120"].map(col => {
                      const [k, label, w] = col.split(":");
                      return React.createElement("th", { key: k, onClick: () => { setSortKey(k); setSortAsc(sortKey === k ? !sortAsc : true); }, style: { ...thStyle(), width: w !== "auto" ? parseInt(w) : undefined } },
                        label + (sortKey === k ? (sortAsc ? " ↑" : " ↓") : "")
                      );
                    }),
                    React.createElement("th", { style: { ...thStyle(), width: 130 } }, "기타"),
                    React.createElement("th", { style: { ...thStyle(), width: 165 } }, "")
                  )
                ),
                React.createElement("tbody", null,
                  filtered.map((r, i) =>
                    React.createElement("tr", { key: r.id, style: { borderBottom: "1px solid #f2f2f2", background: sel.has(r.id) ? "#f0f4ff" : i % 2 === 0 ? "#fff" : "#fafafa" } },
                      React.createElement("td", { style: { padding: "9px 10px 9px 14px" } },
                        React.createElement("input", { type: "checkbox", checked: sel.has(r.id), onChange: () => { const s = new Set(sel); s.has(r.id) ? s.delete(r.id) : s.add(r.id); setSel(s); } })
                      ),
                      React.createElement("td", { style: { padding: "9px 12px" } }, React.createElement(TypeBadge, { type: r.type })),
                      React.createElement("td", { style: { padding: "9px 12px", color: "#777", whiteSpace: "nowrap", fontSize: 12 } }, r.date || "-"),
                      React.createElement("td", { style: { padding: "9px 12px" } },
                        r.cls ? React.createElement("span", { style: { background: "#f0f4ff", color: "#2563eb", padding: "2px 8px", borderRadius: 6, fontSize: 12, fontWeight: 700 } }, r.cls) : "-"
                      ),
                      React.createElement("td", { style: { padding: "9px 12px", fontWeight: 700, whiteSpace: "nowrap" } }, r.name),
                      React.createElement("td", { style: { padding: "9px 12px", color: "#333", maxWidth: 260, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }, title: r.content }, r.content || "-"),
                      React.createElement("td", { style: { padding: "9px 12px", color: "#555", whiteSpace: "nowrap", fontSize: 12 } }, r.retestDate || "-"),
                      React.createElement("td", { style: { padding: "9px 12px", color: "#999", maxWidth: 130, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", fontSize: 12 }, title: r.notes }, r.notes || "-"),
                      React.createElement("td", { style: { padding: "9px 10px" } },
                        React.createElement("div", { style: { display: "flex", gap: 4 } },
                          r.type !== "완료" && React.createElement("button", { onClick: () => handleSave({ ...r, type: "완료" }), style: { padding: "4px 9px", background: "#e4f5ec", color: "#1a7a4a", border: "1px solid #b2dfcc", borderRadius: 6, cursor: "pointer", fontSize: 11, fontWeight: 700, whiteSpace: "nowrap" } }, "✓ 완료"),
                          r.type === "완료" && React.createElement("button", { onClick: () => handleSave({ ...r, type: "재시험" }), style: { padding: "4px 9px", background: "#f5f5f5", color: "#888", border: "1px solid #ddd", borderRadius: 6, cursor: "pointer", fontSize: 11, whiteSpace: "nowrap" } }, "↩ 되돌리기"),
                          React.createElement("button", { onClick: () => setModal(r), style: { padding: "4px 9px", background: "#f0f4ff", color: "#2563eb", border: "1px solid #c7d7fa", borderRadius: 6, cursor: "pointer", fontSize: 11 } }, "수정"),
                          React.createElement("button", { onClick: () => setDelId(r.id), style: { padding: "4px 8px", background: "#fff", color: "#ccc", border: "1px solid #eee", borderRadius: 6, cursor: "pointer", fontSize: 11 } }, "삭제")
                        )
                      )
                    )
                  )
                )
              )
            ),
            React.createElement("div", { style: { padding: "8px 14px", borderTop: "1px solid #f0f0f0", background: "#f8f9fa", fontSize: 12, color: "#aaa" } },
              `${filtered.length}건 표시${records.length !== filtered.length ? ` / 전체 ${records.length}건` : ""}`
            )
          ),

      // Modals
      modal && React.createElement(Modal, { record: modal === "add" ? null : modal, onSave: handleSave, onClose: () => setModal(null), saving }),

      delId && React.createElement("div", { style: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200 } },
        React.createElement("div", { style: { background: "#fff", borderRadius: 14, padding: "28px 32px", textAlign: "center", width: "min(340px, 90vw)", boxShadow: "0 8px 32px rgba(0,0,0,0.15)" } },
          React.createElement("div", { style: { fontSize: 36, marginBottom: 10 } }, "🗑️"),
          React.createElement("p", { style: { margin: "0 0 6px", fontSize: 15, fontWeight: 500 } }, "이 기록을 삭제하시겠습니까?"),
          React.createElement("p", { style: { margin: "0 0 20px", fontSize: 12, color: "#e53e3e" } }, "구글시트에서도 삭제됩니다."),
          React.createElement("div", { style: { display: "flex", gap: 10, justifyContent: "center" } },
            React.createElement("button", { onClick: () => setDelId(null), style: { padding: "9px 22px", border: "1px solid #ddd", borderRadius: 8, background: "#f5f5f5", cursor: "pointer", fontSize: 14 } }, "취소"),
            React.createElement("button", { onClick: () => handleDelete(delId), style: { padding: "9px 22px", border: "none", borderRadius: 8, background: "#e53e3e", color: "#fff", cursor: "pointer", fontSize: 14, fontWeight: 600 } }, "삭제")
          )
        )
      )
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
