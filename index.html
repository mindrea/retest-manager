<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재시험 관리 - 엘리트관</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #f4f6fb; color: #111; min-height: 100vh; }
input, select, textarea, button { font-family: inherit; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 36px; height: 36px; border: 3px solid #e0e0e0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: #fff; border-radius: 16px; padding: 26px 28px 20px; width: min(560px, 96vw); max-height: 92vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.18); }
.modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 14px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0 14px; }
.field { margin-bottom: 14px; }
label { font-size: 12px; color: #555; margin-bottom: 4px; display: block; font-weight: 600; }
input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; color: #111; outline: none; }
input:focus, select:focus, textarea:focus { border-color: #2563eb; }
textarea { resize: vertical; min-height: 80px; }
.btn { padding: 9px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; border: none; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:disabled { background: #93b4f5; cursor: default; }
.btn-secondary { background: #f5f5f5; color: #444; border: 1px solid #ddd; }
.badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
.badge-재시험  { background: #e8f0fe; color: #1a56db; border: 1px solid #c7d7fa; }
.badge-보강시험 { background: #f0e8ff; color: #7e3af2; border: 1px solid #d5b8ff; }
.badge-완료   { background: #e4f5ec; color: #1a7a4a; border: 1px solid #b2dfcc; }
.cls-badge { background: #f0f4ff; color: #2563eb; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: 700; }
.stat-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 11px 18px; flex: 1 1 70px; min-width: 70px; }
.stat-card.warn { background: #fff8e1; border-color: #ffc107; }
.stat-label { font-size: 11px; color: #aaa; font-weight: 600; }
.stat-label.warn { color: #7a5800; }
.stat-val { font-size: 24px; font-weight: 700; margin-top: 2px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 10px 12px; text-align: left; font-weight: 600; font-size: 12px; color: #555; white-space: nowrap; cursor: pointer; user-select: none; background: #f7f8fa; }
td { padding: 9px 12px; border-bottom: 1px solid #f2f2f2; }
tr:hover td { background: #f9fbff; }
tr.selected td { background: #f0f4ff; }
.action-btn { padding: 4px 9px; border-radius: 6px; font-size: 11px; cursor: pointer; white-space: nowrap; font-weight: 600; border: 1px solid; }
.btn-done   { background: #e4f5ec; color: #1a7a4a; border-color: #b2dfcc; }
.btn-undo   { background: #f5f5f5; color: #888; border-color: #ddd; }
.btn-edit   { background: #f0f4ff; color: #2563eb; border-color: #c7d7fa; font-weight: 400; }
.btn-del    { background: #fff; color: #ccc; border-color: #eee; font-weight: 400; }
.btn-bulk   { padding: 8px 14px; background: #e4f5ec; color: #1a7a4a; border: 1px solid #b2dfcc; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 700; }
.empty { text-align: center; padding: 60px 20px; color: #ccc; border: 1px dashed #e0e0e0; border-radius: 12px; background: #fff; }
.footer { padding: 8px 14px; border-top: 1px solid #f0f0f0; background: #f8f9fa; font-size: 12px; color: #aaa; }
</style>
</head>
<body>

<div id="app" style="max-width:1200px;margin:0 auto;padding:20px 14px;">
  <div style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px;">
    <div class="spinner"></div>
    <p style="color:#aaa;font-size:14px;">데이터를 불러오는 중…</p>
  </div>
</div>

<script>
const SUPABASE_URL = "https://xzixcgbwuquafytaxbhg.supabase.co";
const SUPABASE_KEY = "sb_publishable_0EcI5W-QDHWz7Qkd_0AoGA_qmCfuKtv";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TYPES = ["재시험", "보강시험", "완료"];
let records = [];
let sortKey = "created_at";
let sortAsc = false;
let search = "";
let fType = "전체";
let fCls = "전체";
let sel = new Set();
let editRecord = null;
let deleteId = null;
let saving = false;

// ── DB ──────────────────────────────────────────────
async function loadData() {
  const { data, error } = await sb.from("retests").select("*").order("created_at", { ascending: false });
  if (error) { showError(error.message); return; }
  records = data || [];
  render();
}

async function addRecord(form) {
  const { data, error } = await sb.from("retests").insert([form]).select().single();
  if (error) throw error;
  records.unshift(data);
}

async function updateRecord(id, form) {
  const { error } = await sb.from("retests").update(form).eq("id", id);
  if (error) throw error;
  const idx = records.findIndex(r => r.id === id);
  if (idx !== -1) records[idx] = { ...records[idx], ...form };
}

async function deleteRecord(id) {
  const { error } = await sb.from("retests").delete().eq("id", id);
  if (error) throw error;
  records = records.filter(r => r.id !== id);
}

// ── Filtering ───────────────────────────────────────
function getFiltered() {
  return records.filter(r => {
    const q = search.toLowerCase();
    if (q && !r.name?.includes(q) && !(r.cls||"").toLowerCase().includes(q) && !(r.content||"").toLowerCase().includes(q) && !(r.notes||"").toLowerCase().includes(q)) return false;
    if (fType !== "전체" && r.type !== fType) return false;
    if (fCls !== "전체" && r.cls !== fCls) return false;
    return true;
  }).sort((a, b) => {
    const av = a[sortKey] || "", bv = b[sortKey] || "";
    return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });
}

// ── Render ──────────────────────────────────────────
function render() {
  const filtered = getFiltered();
  const stats = {
    전체: records.length,
    재시험: records.filter(r => r.type === "재시험").length,
    보강시험: records.filter(r => r.type === "보강시험").length,
    완료: records.filter(r => r.type === "완료").length,
    미완료: records.filter(r => r.type !== "완료").length,
  };
  const clsList = ["전체", ...Array.from(new Set(records.map(r => r.cls).filter(Boolean))).sort()];
  const allChk = filtered.length > 0 && filtered.every(r => sel.has(r.id));

  document.getElementById("app").innerHTML = `
  <div>
    <!-- Header -->
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;">
      <div>
        <h1 style="font-size:22px;font-weight:700;">📋 재시험 관리</h1>
        <p style="font-size:12px;color:#aaa;margin-top:3px;">엘리트관 · Supabase 실시간 연동</p>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary" onclick="loadData()" style="font-size:13px;">↻ 새로고침</button>
        <button class="btn btn-primary" onclick="openModal(null)">+ 추가</button>
      </div>
    </div>

    <!-- Stats -->
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
      <div class="stat-card"><div class="stat-label">전체</div><div class="stat-val" style="color:#374151;">${stats.전체}</div></div>
      <div class="stat-card"><div class="stat-label">재시험</div><div class="stat-val" style="color:#1a56db;">${stats.재시험}</div></div>
      <div class="stat-card"><div class="stat-label">보강시험</div><div class="stat-val" style="color:#7e3af2;">${stats.보강시험}</div></div>
      <div class="stat-card"><div class="stat-label">완료</div><div class="stat-val" style="color:#1a7a4a;">${stats.완료}</div></div>
      <div class="stat-card warn"><div class="stat-label warn">⚠ 미완료</div><div class="stat-val" style="color:#b97300;">${stats.미완료}</div></div>
    </div>

    <!-- Filters -->
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;">
      <input style="flex:1 1 160px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;"
        placeholder="🔍  이름 · 반명 · 내용 검색" value="${search}"
        oninput="search=this.value;render();" />
      <select style="padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;color:#333;" onchange="fType=this.value;render();">
        ${["전체",...TYPES].map(t=>`<option ${fType===t?"selected":""}>${t}</option>`).join("")}
      </select>
      <select style="padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;color:#333;" onchange="fCls=this.value;render();">
        ${clsList.map(c=>`<option ${fCls===c?"selected":""}>${c}</option>`).join("")}
      </select>
      ${sel.size > 0 ? `<button class="btn-bulk" onclick="bulkDone()">✓ 선택 ${sel.size}건 완료 처리</button>` : ""}
    </div>

    <!-- Table -->
    ${filtered.length === 0 ? `
      <div class="empty">
        <div style="font-size:40px;margin-bottom:10px;">📄</div>
        <div style="font-size:14px;">${records.length === 0 ? "등록된 기록이 없습니다" : "검색 결과가 없습니다"}</div>
        ${records.length === 0 ? `<button class="btn btn-primary" style="margin-top:16px;" onclick="openModal(null)">첫 번째 재시험 추가하기</button>` : ""}
      </div>
    ` : `
      <div style="border:1px solid #e8e8e8;border-radius:12px;overflow:hidden;background:#fff;">
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th style="width:36px;padding-left:14px;">
                  <input type="checkbox" ${allChk?"checked":""} onchange="toggleAll(this.checked,${JSON.stringify(filtered.map(r=>r.id))})" />
                </th>
                ${[["type","구분",80],["date","날짜",90],["cls","반명",60],["name","이름",72],["content","재시 내용",null],["retest_date","재시 일자",120]].map(([k,l,w])=>`
                  <th style="${w?"width:"+w+"px":""}" onclick="setSortKey('${k}')">
                    ${l}${sortKey===k?(sortAsc?" ↑":" ↓"):""}
                  </th>`).join("")}
                <th style="width:130px;">기타</th>
                <th style="width:170px;"></th>
              </tr>
            </thead>
            <tbody>
              ${filtered.map((r,i)=>`
                <tr class="${sel.has(r.id)?"selected":""}" style="background:${sel.has(r.id)?"#f0f4ff":i%2===0?"#fff":"#fafafa"}">
                  <td style="padding-left:14px;">
                    <input type="checkbox" ${sel.has(r.id)?"checked":""} onchange="toggleSel('${r.id}',this.checked)" />
                  </td>
                  <td><span class="badge badge-${r.type}">${r.type}</span></td>
                  <td style="color:#777;white-space:nowrap;font-size:12px;">${r.date||"-"}</td>
                  <td>${r.cls?`<span class="cls-badge">${r.cls}</span>`:"-"}</td>
                  <td style="font-weight:700;white-space:nowrap;">${r.name||"-"}</td>
                  <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#333;" title="${(r.content||"").replace(/"/g,"&quot;")}">${r.content||"-"}</td>
                  <td style="white-space:nowrap;font-size:12px;color:#555;">${r.retest_date||"-"}</td>
                  <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:#999;" title="${(r.notes||"").replace(/"/g,"&quot;")}">${r.notes||"-"}</td>
                  <td>
                    <div style="display:flex;gap:4px;">
                      ${r.type!=="완료"?`<button class="action-btn btn-done" onclick="quickDone('${r.id}')">✓ 완료</button>`:""}
                      ${r.type==="완료"?`<button class="action-btn btn-undo" onclick="quickUndo('${r.id}')">↩ 되돌리기</button>`:""}
                      <button class="action-btn btn-edit" onclick='openModal(${JSON.stringify(r)})'>수정</button>
                      <button class="action-btn btn-del" onclick="confirmDelete('${r.id}')">삭제</button>
                    </div>
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
        <div class="footer">${filtered.length}건 표시${records.length!==filtered.length?` / 전체 ${records.length}건`:""}</div>
      </div>
    `}
  </div>`;
}

function showError(msg) {
  document.getElementById("app").innerHTML = `
    <div style="padding:40px;text-align:center;">
      <div style="font-size:40px;margin-bottom:12px;">⚠️</div>
      <p style="color:#e53e3e;font-weight:600;margin-bottom:8px;">데이터베이스 연결 실패</p>
      <p style="color:#888;font-size:13px;margin-bottom:24px;">${msg}</p>
      <button class="btn btn-primary" onclick="loadData()">다시 시도</button>
    </div>`;
}

// ── Actions ─────────────────────────────────────────
function setSortKey(k) {
  if (sortKey === k) sortAsc = !sortAsc;
  else { sortKey = k; sortAsc = true; }
  render();
}

function toggleSel(id, checked) {
  checked ? sel.add(id) : sel.delete(id);
  render();
}

function toggleAll(checked, ids) {
  if (checked) ids.forEach(id => sel.add(id));
  else ids.forEach(id => sel.delete(id));
  render();
}

async function quickDone(id) {
  await updateRecord(id, { type: "완료" });
  render();
}

async function quickUndo(id) {
  await updateRecord(id, { type: "재시험" });
  render();
}

async function bulkDone() {
  const targets = records.filter(r => sel.has(r.id) && r.type !== "완료");
  for (const r of targets) await updateRecord(r.id, { type: "완료" });
  sel = new Set();
  render();
}

function confirmDelete(id) {
  deleteId = id;
  const r = records.find(x => x.id === id);
  document.body.insertAdjacentHTML("beforeend", `
    <div class="overlay" id="del-modal">
      <div style="background:#fff;border-radius:14px;padding:28px 32px;text-align:center;width:min(340px,90vw);box-shadow:0 8px 32px rgba(0,0,0,0.15);">
        <div style="font-size:36px;margin-bottom:10px;">🗑️</div>
        <p style="margin:0 0 6px;font-size:15px;font-weight:500;">${r?.name} 기록을 삭제하시겠습니까?</p>
        <p style="margin:0 0 20px;font-size:12px;color:#e53e3e;">데이터베이스에서도 삭제됩니다.</p>
        <div style="display:flex;gap:10px;justify-content:center;">
          <button class="btn btn-secondary" onclick="closeDelete()">취소</button>
          <button class="btn" style="background:#e53e3e;color:#fff;" onclick="doDelete()">삭제</button>
        </div>
      </div>
    </div>`);
}

function closeDelete() {
  document.getElementById("del-modal")?.remove();
  deleteId = null;
}

async function doDelete() {
  if (!deleteId) return;
  await deleteRecord(deleteId);
  closeDelete();
  render();
}

// ── Modal ────────────────────────────────────────────
function openModal(record) {
  editRecord = record;
  const f = record || { type: "재시험", date: "", cls: "", name: "", content: "", retest_date: "", notes: "" };
  document.body.insertAdjacentHTML("beforeend", `
    <div class="overlay" id="edit-modal" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
          <h2 style="margin:0;">${record ? "기록 수정" : "재시험 추가"}</h2>
          <button onclick="closeModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#999;">✕</button>
        </div>
        <div class="grid3">
          <div class="field"><label>구분</label>
            <select id="f-type">${TYPES.map(t=>`<option ${f.type===t?"selected":""}>${t}</option>`).join("")}</select>
          </div>
          <div class="field"><label>날짜</label><input id="f-date" type="date" value="${f.date||""}"></div>
          <div class="field"><label>반명</label><input id="f-cls" value="${f.cls||""}" placeholder="M1A, 6B …"></div>
        </div>
        <div class="field"><label>이름 *</label><input id="f-name" value="${f.name||""}" placeholder="학생 이름"></div>
        <div class="field">
          <label>재시 내용 (Insight Link / Short Article은 영영풀이 불러주기)</label>
          <textarea id="f-content" placeholder="예: BV4800 스프링테스트 - Unit 15">${f.content||""}</textarea>
        </div>
        <div class="grid2">
          <div class="field"><label>재시 일자</label><input id="f-retest" value="${f.retest_date||""}" placeholder="예: 3/12 목 18시"></div>
          <div class="field"><label>기타</label><input id="f-notes" value="${f.notes||""}" placeholder="메모"></div>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px;">
          <button class="btn btn-secondary" onclick="closeModal()">취소</button>
          <button class="btn btn-primary" id="save-btn" onclick="saveModal()">저장</button>
        </div>
      </div>
    </div>`);
}

function closeModal() {
  document.getElementById("edit-modal")?.remove();
  editRecord = null;
}

async function saveModal() {
  const name = document.getElementById("f-name").value.trim();
  if (!name) { alert("이름을 입력하세요."); return; }
  const btn = document.getElementById("save-btn");
  btn.textContent = "저장 중…"; btn.disabled = true;
  const form = {
    type: document.getElementById("f-type").value,
    date: document.getElementById("f-date").value,
    cls: document.getElementById("f-cls").value,
    name,
    content: document.getElementById("f-content").value,
    retest_date: document.getElementById("f-retest").value,
    notes: document.getElementById("f-notes").value,
  };
  try {
    if (editRecord) await updateRecord(editRecord.id, form);
    else await addRecord(form);
    closeModal();
    render();
  } catch(e) {
    alert("저장 실패: " + e.message);
    btn.textContent = "저장"; btn.disabled = false;
  }
}

// ── Init ─────────────────────────────────────────────
loadData();
</script>
</body>
</html>
